name: copy-jiku-ch-tmp
on:
  workflow_dispatch:
jobs:
  copy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: copy LW_JIKU_CH to apotool-automation
        env:
          CH: ${{ secrets.LW_JIKU_CH }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$CH" | gh secret set LW_JIKU_CH --repo shin3578-oss/apotool-automation --body "$CH"
          echo "コピー完了"
