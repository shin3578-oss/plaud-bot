name: 軸MTG Bot 議事録自動投稿

on:
  schedule:
    - cron: '0 14 * * 3'  # 毎週水曜 23:00 JST (= 14:00 UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 軸MTG Botを実行
        env:
          PLAUD_TOKEN:             ${{ secrets.PLAUD_TOKEN }}
          GOOGLE_DOCS_ID:          ${{ secrets.GOOGLE_DOCS_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          LW_PRIVATE_KEY:          ${{ secrets.LW_PRIVATE_KEY }}
          LW_JIKU_CH:              ${{ secrets.LW_JIKU_CH }}
        run: python plaud_bot.py
