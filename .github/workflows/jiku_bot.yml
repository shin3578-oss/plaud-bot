name: 軸MTG Bot 議事録自動投稿

on:
  schedule:
    - cron: '0 12 * * 3'  # 毎週水曜 21:00 JST (= 12:00 UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright ブラウザをインストール
        run: playwright install chromium --with-deps

      - name: 軸MTG Botを実行
        env:
          PLAUD_TOKEN:             ${{ secrets.PLAUD_TOKEN }}
          GOOGLE_DOCS_ID:          ${{ secrets.GOOGLE_DOCS_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          LW_LOGIN_ID:             ${{ secrets.LW_LOGIN_ID }}
          LW_PASSWORD:             ${{ secrets.LW_PASSWORD }}
        run: python plaud_bot.py
