name: 朝練Bot 議事録自動投稿

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 10:00 JST (= 01:00 UTC)
  workflow_dispatch:      # 手動実行も可能

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 朝練Botを実行
        env:
          PLAUD_TOKEN:             ${{ secrets.PLAUD_TOKEN }}
          GOOGLE_DOCS_ID_ASAREN:   ${{ secrets.GOOGLE_DOCS_ID_ASAREN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          LW_PRIVATE_KEY:          ${{ secrets.LW_PRIVATE_KEY }}
        run: python asaren_bot.py
